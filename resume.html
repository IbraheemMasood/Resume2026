<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ibraheem — resume</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@100..800&display=swap" rel="stylesheet">
  <style>
    /* ---- RESUME PAGE STYLES ---- */

    /* Override body padding-bottom to account for terminal bar */
    body {
      padding-bottom: 56px;
    }

    .resume-layout {
      position: relative;
      margin-top: 16px;
    }

    /* The scrollable resume content box */
    .resume-box {
      border: 1.5px solid var(--black);
      background: var(--white);
      height: calc(65vh); /* fill most of the viewport */
      overflow-y: scroll;
      padding: 24px 28px;
      scroll-behavior: smooth;
    }

    /* Each section inside the resume */
    .resume-section {
      margin-bottom: 40px;
    }

    .resume-section h2 {
      font-family: var(--font);
      font-size: 16px;
      font-weight: bold;
      border-bottom: 1px dashed var(--black);
      padding-bottom: 4px;
      margin-bottom: 12px;
    }

    /* TOC box — floats to the right, overlapping the resume box */
    .resume-toc {
      position: absolute;
      top: 50%;           /* vertically centered alongside the resume box */
      right: -20px;       /* slightly outside the resume box right edge */
      transform: translateY(-50%);
      background: var(--salmon);
      border: 1.5px solid var(--black);
      padding: 12px 14px;
      z-index: 10;

      /* Semi-transparent until hovered */
      opacity: 0.35;
      transition: opacity 120ms ease;
    }

    .resume-toc:hover {
      opacity: 1;
    }

    .resume-toc a {
      display: block;
      font-family: var(--font);
      font-size: 14px;
      font-weight: bold;
      padding: 3px 0;
    }

    .resume-toc a:hover {
      text-decoration: underline;
    }

    .resume-toc .nav-divider {
      border: none;
      border-top: 1px dashed var(--black);
      margin: 2px 0;
    }

    /* Terminal bar — fixed at bottom of viewport */
    .terminal-bar {
      position: static;
      width: 100%;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--salmon);
      border-top: 1.5px solid var(--black);
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 8px;
      font-family: var(--font);
      font-size: 14px;
      z-index: 200;
    }

    .terminal-prompt {
      white-space: nowrap;
      font-weight: bold;
      color: #7a4a00;
    }

    .terminal-input {
      flex: 1;
      font-family: var(--font);
      font-size: 14px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--black);
      caret-color: var(--black);
    }

    /* Blinking cursor shown when input is empty and unfocused */
    .terminal-cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--black);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Hide cursor when input is focused (real caret takes over) */
    .terminal-input:focus ~ .terminal-cursor {
      display: none;
    }

    .terminal-hint {
      font-size: 13px;
      color: #555;
      white-space: nowrap;
    }

    /* On mobile: hide terminal, show plain TOC instead */
    @media (max-width: 768px) {
      body {
        padding-bottom: 16px;
      }

      .terminal-bar {
        display: none;
      }

      .resume-toc {
        position: static;
        transform: none;
        opacity: 1;
        display: flex;
        flex-wrap: wrap;
        gap: 0 16px;
        margin-bottom: 12px;
        width: 100%;
      }

      .resume-toc .nav-divider {
        display: none;
      }

      .resume-box {
        height: auto;
        overflow-y: visible;
      }
    }
  </style>
</head>
<body>

  <!-- FIXED NAV: "resume" is active so it uses / prefix -->
  <nav class="site-nav">
    <a href="./index.html">>home</a>
    <hr class="nav-divider" />
    <a href="resume.html">/resume</a>
    <hr class="nav-divider" />
    <a href="contact.html">&gt;contact</a>
    <hr class="nav-divider" />
    <a href="blog.html">&gt;blog</a>
  </nav>

  <div class="mobile-note">! best experienced on desktop</div>

  <h1 class="page-heading">resume</h1>
  <div class="page-heading-dashes">------------------------------</div>

  <div class="resume-layout">


    <div class="resume-box" id="resume-box">

      <section class="resume-section" id="work-experience">
        <h2>/work experience</h2>
        <!-- Add work experience entries here -->

      </section>

      <section class="resume-section" id="education">
        <h2>&gt;education</h2>
        <!-- Add education entries here -->
      </section>

      <section class="resume-section" id="projects">
        <h2>&gt;projects</h2>
        <!-- Add projects here -->
      </section>

      <section class="resume-section" id="skills">
        <h2>&gt;skills</h2>
        <!-- Add skills here -->
      </section>

      <section class="resume-section" id="hobbies">
        <h2>&gt;hobbies</h2>
        <!-- Add hobbies here -->
      </section>

    </div>

    <!-- TERMINAL BAR -->
    <div class="terminal-bar">
      <span class="terminal-prompt">~/resume&gt;</span>
      <!-- JS: listen for Enter on this input.
           Parse the command:
             "cd <section>"     → scroll resume-box to that section id
             "cd ../<page>"     → navigate with window.location.href
           On unrecognised command, briefly flash the input red or show
           a short error in the hint span.
           Clear the input after each command. -->
      <span class="terminal-cursor"></span>
      <input
              class="terminal-input"
              id="terminal-input"
              type="text"
              autocomplete="off"
              spellcheck="false"
      />
      <span class="terminal-hint" id="terminal-hint">hint: try cd skills, or grep python</span>
    </div>
    <!-- TOC: semi-transparent, full opacity on hover -->
    <!-- JS: as the user scrolls the resume box, update the active
         section in the TOC by swapping > for / on the current section link.
         Listen to the 'scroll' event on #resume-box and check each
         section's offsetTop against box.scrollTop. -->
    <nav class="resume-toc">
      <a href="#work-experience" data-section="work-experience">/work experience</a>
      <hr class="nav-divider" />
      <a href="#education" data-section="education">&gt;education</a>
      <hr class="nav-divider" />
      <a href="#projects" data-section="projects">&gt;projects</a>
      <hr class="nav-divider" />
      <a href="#skills" data-section="skills">&gt;skills</a>
      <hr class="nav-divider" />
      <a href="#hobbies" data-section="hobbies">&gt;hobbies</a>
    </nav>

  </div>

<script>
  (function () {

    // ============================================================
    // CONSTANTS & STATE
    // ============================================================

    const box      = document.getElementById('resume-box');
    const input    = document.getElementById('terminal-input');
    const hint     = document.getElementById('terminal-hint');
    const tocLinks = document.querySelectorAll('.resume-toc a');
    const cursor   = document.querySelector('.terminal-cursor');

    const SECTIONS = ['work-experience', 'education', 'projects', 'skills', 'hobbies'];

    const PAGES = {
      home:    'index.html',
      contact: 'contact.html',
      blog:    'blog.html',
    };

    let matches    = [];
    let matchIndex = -1;

    // ============================================================
    // TOC CLICK HANDLERS  ← now after tocLinks is declared
    // ============================================================

    tocLinks.forEach(function (link) {
      link.addEventListener('click', function (e) {
        e.preventDefault();
        scrollToSection(link.dataset.section);
      });
    });

    // cursor focus/blur
    input.addEventListener('focus', () => cursor.style.display = 'none');
    input.addEventListener('blur',  () => cursor.style.display = 'inline-block');

    // ============================================================
    // TERMINAL — COMMAND PARSING
    // ============================================================

    input.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;

      const raw     = input.value.trim();
      const parts   = raw.split(/\s+/);
      const command = parts[0];
      const arg     = parts.slice(1).join(' ');

      if (command === 'cd') {
        handleCd(arg);
      } else if (command === 'grep') {
        handleGrep(arg);
      } else {
        showHint('unknown command: ' + command, true);
      }

      input.value = '';
    });

    // ============================================================
    // CD — NAVIGATION
    // ============================================================

    function handleCd(arg) {
      // cd ../<page>  →  navigate to another page
      if (arg.startsWith('../')) {
        const page = arg.slice(3).toLowerCase();
        if (PAGES[page]) {
          window.location.href = PAGES[page];
        } else {
          showHint('no such page: ' + page, true);
        }
        return;
      }

      // cd <section>  →  scroll resume box to that section
      // normalise: "work experience" and "work-experience" both work
      const normalised = arg.toLowerCase().replace(/\s+/g, '-');
      if (SECTIONS.includes(normalised)) {
        scrollToSection(normalised);
        showHint('cd ' + normalised, false);
      } else {
        showHint('no such section: ' + arg, true);
      }
    }

    function scrollToSection(id) {
      const target = document.getElementById(id);
      if (!target) return;
      // scroll the resume box, not the window
      box.scrollTop = target.offsetTop - 16;
      updateToc(id);
    }

    // ============================================================
    // GREP — SEARCH & HIGHLIGHT
    // ============================================================

    function handleGrep(pattern) {
      clearHighlights();

      if (!pattern) {
        showHint('usage: grep <pattern>', true);
        return;
      }

      let regex;
      try {
        // -i flag for case insensitive: grep -i <pattern>
        if (pattern.startsWith('-i ')) {
          regex = new RegExp(pattern.slice(3), 'gi');
        } else {
          regex = new RegExp(pattern, 'g');
        }
      } catch (e) {
        showHint('invalid regex: ' + pattern, true);
        return;
      }

      // Walk every text node inside the resume box and wrap matches
      walkAndHighlight(box, regex);

      matches = Array.from(box.querySelectorAll('mark.grep-match'));

      if (matches.length === 0) {
        showHint('no matches: ' + pattern, true);
        return;
      }

      matchIndex = 0;
      jumpToMatch(matchIndex);
      updateMatchHint();
    }

    function walkAndHighlight(root, regex) {
      // TreeWalker visits every text node in the resume box
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const nodesToReplace = [];

      let node;
      while ((node = walker.nextNode())) {
        if (regex.test(node.textContent)) {
          nodesToReplace.push(node);
        }
        regex.lastIndex = 0; // reset stateful regex after each test
      }

      nodesToReplace.forEach(function (textNode) {
        const frag = document.createDocumentFragment();
        const parts = textNode.textContent.split(regex);
        const rawMatches = textNode.textContent.match(regex) || [];

        parts.forEach(function (part, i) {
          frag.appendChild(document.createTextNode(part));
          if (rawMatches[i]) {
            const mark = document.createElement('mark');
            mark.className = 'grep-match';
            mark.textContent = rawMatches[i];
            frag.appendChild(mark);
          }
        });

        textNode.parentNode.replaceChild(frag, textNode);
      });
    }

    function clearHighlights() {
      // Unwrap all <mark> elements, restoring original text nodes
      box.querySelectorAll('mark.grep-match').forEach(function (mark) {
        const parent = mark.parentNode;
        parent.replaceChild(document.createTextNode(mark.textContent), mark);
        parent.normalize(); // merge adjacent text nodes
      });
      matches    = [];
      matchIndex = -1;
    }

    function jumpToMatch(index) {
      // Remove active class from all, add to current
      matches.forEach(function (m) { m.classList.remove('grep-active'); });
      const current = matches[index];
      current.classList.add('grep-active');
      // Scroll resume box so the match is visible
      box.scrollTop = current.offsetTop - box.offsetTop - 80;
    }

    function updateMatchHint() {
      hint.textContent = (matchIndex + 1) + '/' + matches.length
              + '   ▲▼ to navigate   esc to clear';
    }

    // ============================================================
    // GREP — ARROW NAVIGATION
    // ============================================================

    input.addEventListener('keydown', function (e) {
      if (matches.length === 0) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        matchIndex = (matchIndex + 1) % matches.length;
        jumpToMatch(matchIndex);
        updateMatchHint();
      }

      if (e.key === 'ArrowUp') {
        e.preventDefault();
        matchIndex = (matchIndex - 1 + matches.length) % matches.length;
        jumpToMatch(matchIndex);
        updateMatchHint();
      }

      if (e.key === 'Escape') {
        clearHighlights();
        showHint('hint: try cd skills, or grep python', false);
      }
    });

    // ============================================================
    // TOC — ACTIVE SECTION ON SCROLL
    // ============================================================

    box.addEventListener('scroll', function () {
      let current = SECTIONS[0];

      SECTIONS.forEach(function (id) {
        const el = document.getElementById(id);
        if (el && el.offsetTop - 32 <= box.scrollTop) {
          current = id;
        }
      });

      updateToc(current);
    });

    function updateToc(activeId) {
      tocLinks.forEach(function (link) {
        const section = link.dataset.section;
        const isActive = section === activeId;
        // swap > for / on active, / for > on inactive
        link.textContent = (isActive ? '/' : '>') + link.textContent.slice(1);
      });
    }

    // ============================================================
    // HINT TEXT HELPER
    // ============================================================

    function showHint(message, isError) {
      hint.textContent = message;
      hint.style.color = isError ? '#c0392b' : '#555';
      // reset colour after 2 seconds
      if (isError) {
        setTimeout(function () {
          hint.style.color = '#555';
        }, 2000);
      }
    }

    // ============================================================
    // GREP HIGHLIGHT STYLES  (injected so they live with the JS)
    // ============================================================

    const style = document.createElement('style');
    style.textContent = `
    mark.grep-match {
      background: var(--salmon);
      color: var(--black);
      border-radius: 0;
      padding: 0 1px;
    }
    mark.grep-active {
      background: var(--black);
      color: var(--white);
    }
  `;
    document.head.appendChild(style);

  }());

</script>
</body>
</html>
